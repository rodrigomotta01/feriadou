<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Redefinir senha</title>
</head>
<body>
  <p>Olá {{ user.get_username }},</p>
  <p>Clique no botão abaixo para redefinir sua senha do Feriadou:</p>
  <p><a href="{{ protocol }}://{{ domain }}{% url 'passwordresetconfirm_view' uidb64=uid token=token|urlencode %}" style="display:inline-block;padding:10px 16px;background:#ff0285;color:#fff;text-decoration:none;border-radius:6px;">Redefinir senha</a></p>
  <p>Ou cole este link no navegador:</p>
  <p>{{ protocol }}://{{ domain }}{% url 'passwordresetconfirm_view' uidb64=uid token=token|urlencode %}</p>
  <p>Se não foi você, ignore este email.</p>
</body>
</html>
