{% load static %}
<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://accounts.google.com/gsi/client" async></script>
    <script>
    tailwind.config = {
        theme: {
        extend: {
            colors: {
            fwhite: '#F8F8F8',
            fblack: '#1E1E1E',
            rose: '#FF0285',
            pink: '#FF68D9',
            magenta: '#A812FF',
            purple: '#560088',
            }
        }
        }
    }
    </script>
    <title>Login - Feriadou</title>
</head>
<body class="bg-rose flex items-center justify-center min-h-screen p-4 ">

    <div class="bg-fwhite rounded-3xl shadow-xl overflow-hidden flex flex-col md:flex-row w-full max-w-4xl lg:max-w-5xl 2xl:max-w-6xl min-h-[480px] 2xl:min-h-[650px]">
        
        <div class="hidden md:flex md:w-1/2 bg-gradient-to-br from-rose to-pink-600 
            p-12 flex-col justify-between relative ">

        <div class="absolute -top-40 -left-40 w-72 h-72 bg-white/50 rounded-full blur-3xl">

           
        </div>


        </div>

        <div class="w-full md:w-1/2 p-8 2xl:p-12 flex flex-col justify-center relative">
            
            <div class="max-w-md mx-auto w-full">
                
                <img class=" mx-auto mb-10" src="{% static 'img/feriadou_logo.svg' %}" 
                    alt="Feriadou Logo">
                </a>

                <h2 class="text-3xl 2xl:text-4xl font-bold text-fblack mb-2">Fazer Login</h2>

                <!--<p class="text-npurple text-xs 2xl:text-sm mb-6 2xl:mb-8 leading-relaxed">
                    Feriados do escopo municipal ao nacional. Inscreva-se para fazer uma solicitação!
                </p>-->

                <p class="text-fblack text-xs 2xl:text-sm mt-4 mb-6">
                    Não tem uma conta? <a href="{% url 'signup_view' %}"><span class="text-rose font-medium hover:underline">Cadastre-se</span></a>
                </p>

                <form method="POST" action="{% url 'login_view' %}">
                    {% csrf_token %}
                    

                    {% if form.non_field_errors %}
                        <div class="mb-4 mt-4 p-2 bg-red-100 text-red-600 rounded text-xs text-center">
                            E-mail ou senha inválidos.
                        </div>
                    {% endif %}
                    
                    <div class="mb-4 2xl:mb-5">
                        <label class="block text-nblack text-sm font-semibold mb-1 2xl:mb-2" for="username">
                            E-mail
                        </label>
                        <input class="w-full px-4 py-2.5 2xl:py-3 rounded-lg border border-gray-300 focus:border-rose focus:ring-2 focus:ring-rose/20 outline-none transition-all text-fblack placeholder-gray-400 text-sm 2xl:text-base"
                               type="email" 
                               name="username" 
                               id="username"
                               placeholder="exemplo@email.com" 
                               autocomplete="email"
                               required>
                    </div>

                    <div class="mb-5 2xl:mb-6 relative">
                        <div class="flex justify-between items-center mb-1 2xl:mb-2">
                            <label class="block text-nblack text-sm font-semibold" for="password">
                                Senha
                            </label>
                            <a href="{% url 'passwordreset_view' %}" class="text-xs 2xl:text-sm text-nblack hover:underline font-medium">
                                Esqueceu sua senha?
                            </a>
                        </div>
                        <input class="w-full px-4 py-2.5 2xl:py-3 rounded-lg border border-gray-300 focus:border-rose focus:ring-2 focus:ring-rose/20 outline-none transition-all text-fblack placeholder-gray-400 text-sm 2xl:text-base"
                               type="password" 
                               name="password" 
                               id="password"
                               placeholder="*************" 
                               autocomplete="current-password"
                               required>
                    </div>

                    <button type="submit" class="w-full mt-2 bg-rose hover:bg-[#FF71AA] text-white font-bold py-2.5 2xl:py-3 rounded-lg shadow-md hover:shadow-lg transition-all transform hover:-translate-y-0.5 text-sm 2xl:text-base">
                        Entrar
                    </button>
                </form>

                <div class="flex items-center my-4 2xl:my-6">
                    <div class="flex-grow border-t border-gray-300"></div>
                    <span class="flex-shrink-0 mx-4 text-gray-400 text-xs 2xl:text-sm">ou</span>
                    <div class="flex-grow border-t border-gray-300"></div>
                </div>

                <div class="flex justify-center">
                    <div id="g_id_onload"
                        data-client_id="932850632858-qpckuf3a3jbd7f6eg5rke9mvilcve3l0.apps.googleusercontent.com"
                        data-context="signin"
                        data-ux_mode="popup"
                        data-login_uri="http://localhost:8000/login_google/"
                        data-auto_select="true"
                        data-itp_support="true">
                    </div>

                    <div class="g_id_signin"
                        data-type="standard"
                        data-shape="rectangular"
                        data-theme="outline"
                        data-text="signin_with"
                        data-size="large"
                        data-logo_alignment="center"
                        data-width="450">
                    </div>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
